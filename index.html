<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Blackjack</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <h1>Blackjack</h1>

    <div id="name-area">
      <input type="text" id="player-name" placeholder="Enter your name" maxlength="15">
      <button onclick="setName()">Set Name</button>
    </div>
    <p id="welcome-msg"></p>

    <div id="dealer-area">
      <h2>Dealer</h2>
      <div id="dealer-cards"></div>
      <p>Score: <span id="dealer-score">0</span></p>
    </div>

    <div id="player-area">
      <h2>You</h2>
      <div id="player-cards"></div>
      <p>Score: <span id="player-score">0</span></p>
    </div>

    <div id="bet-controls">
      <button onclick="placeBet(10)">+10</button>
      <button onclick="placeBet(50)">+50</button>
      <button onclick="placeBet(100)">+100</button>
      <button onclick="clearBet()">Clear Bet</button>
    </div>

    <div id="controls">
      <button id="hit-btn" onclick="hit()">Hit</button>
      <button id="stand-btn" onclick="stand()">Stand</button>
      <button id="double-btn" onclick="doubleDown()">Double Down</button>
    </div>

    <div id="new-game-controls">
      <button onclick="newGame()">New Game</button>
      <button id="reset-btn" onclick="resetStats()">Reset Stats</button>
    </div>

    <div id="stats-area">
      <p>Chips: <span id="chip-count">1000</span></p>
      <p>Bet: <span id="bet-amount">0</span></p>
      <p>Wins: <span id="win-count">0</span> | Losses: <span id="loss-count">0</span></p>
    </div>

    <div id="leaderboard-area">
      <h2>Leaderboard</h2>
      <ol id="leaderboard-list"></ol>
    </div>

    <p id="message">Press New Game to start!</p>

    <script src="script.js"></script>
  </body>
</html>
